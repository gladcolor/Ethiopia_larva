const SAT_PATH = "./tiles";
function pctClass(p){if(p>=99)return'pct-top';if(p>=90)return'pct-hi';if(p>=75)return'pct-med';if(p>=50)return'pct-low';return'pct-bot';}
function renderStats(){
  const n=SITES.length;
  const counts=SITES.map(s=>s.larvae);
  const mean=(counts.reduce((a,b)=>a+b,0)/n).toFixed(1);
  const mx=Math.max(...counts).toFixed(1);
  const mn=Math.min(...counts).toFixed(1);
  document.getElementById('stats').innerHTML=`
    <div class="stat-item"><div class="stat-value">${n}</div><div class="stat-label">Total patches</div></div>
    <div class="stat-item"><div class="stat-value">${mean}</div><div class="stat-label">Mean predicted</div></div>
    <div class="stat-item"><div class="stat-value">${mx}</div><div class="stat-label">Max predicted</div></div>
    <div class="stat-item"><div class="stat-value">${mn}</div><div class="stat-label">Min predicted</div></div>`;
}
function renderGallery(){
  document.getElementById('gallery').innerHTML=SITES.map((s,idx)=>`
    <div class="tile" onclick="openModal(${idx})">
      <span class="rank-badge">#${s.rank}</span>
      <img src="${SAT_PATH}/${s.id}_100m.png" alt="Site ${s.id}"
           onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2316213e%22 width=%22100%22 height=%22100%22/><text x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%23555%22 font-size=%2210%22>No Image</text></svg>'">
      <div class="overlay">
        <span class="site-id">Site ${s.id}</span>
        <span class="larvae-count ${pctClass(s.percentile)}">${s.larvae}</span>
      </div>
    </div>`).join('');
}
let curIdx=-1;
function openModal(idx){
  curIdx=idx; const s=SITES[idx];
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-header">
      <h2>Site ${s.id}</h2>
      <div class="modal-info">
        <span>Rank: #${s.rank} / ${SITES.length}</span>
        <span>Predicted: ${s.larvae}</span>
        <span>Percentile: ${s.percentile.toFixed(2)}</span>
      </div>
    </div>
    <img class="modal-img" src="${SAT_PATH}/${s.id}_100m.png" alt="Site ${s.id}">`;
  document.getElementById('siteModal').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('siteModal').classList.remove('active');document.body.style.overflow='';curIdx=-1;}
function nav(d){if(curIdx<0)return;let i=curIdx+d;if(i<0)i=SITES.length-1;if(i>=SITES.length)i=0;openModal(i);}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  else if(e.key==='ArrowLeft'&&curIdx>=0)nav(-1);
  else if(e.key==='ArrowRight'&&curIdx>=0)nav(1);
});
renderStats(); renderGallery();
</script>
